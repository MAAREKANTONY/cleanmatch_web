<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CleanMatch Web</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f7f8fb; color: #1f2937; }
        .container { width: min(1100px, calc(100% - 32px)); margin: 0 auto; }
        header { background: #111827; color: white; padding: 20px 0; margin-bottom: 24px; }
        header a { color: white; text-decoration: none; }
        .card { background: white; border-radius: 14px; box-shadow: 0 10px 30px rgba(17,24,39,.08); padding: 20px; margin-bottom: 20px; }
        .btn { display: inline-block; border: 0; border-radius: 10px; padding: 12px 18px; background: #2563eb; color: white; text-decoration: none; cursor: pointer; }
        .btn-secondary { background: #374151; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #e5e7eb; text-align: left; }
        .muted { color: #6b7280; }
        .badge { display: inline-block; padding: 5px 10px; border-radius: 999px; font-size: 12px; font-weight: bold; }
        .badge-pending, .badge-queued { background: #fef3c7; color: #92400e; }
        .badge-running { background: #dbeafe; color: #1d4ed8; }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-failed, .badge-cancelled { background: #fee2e2; color: #991b1b; }
        .progress { background: #e5e7eb; height: 12px; border-radius: 999px; overflow: hidden; }
        .progress-bar { height: 12px; background: #2563eb; }
        pre { white-space: pre-wrap; word-break: break-word; background: #0f172a; color: #e2e8f0; border-radius: 12px; padding: 16px; }
        .messages { margin-bottom: 18px; }
        .message { padding: 12px 14px; background: #ecfeff; border-left: 4px solid #0891b2; border-radius: 8px; margin-bottom: 10px; }
        .grid { display: grid; gap: 20px; }
        .grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
    </style>
</head>
<body>
<header>
    <div class="container">
        <h1 style="margin:0;"><a href="/">CleanMatch Web</a></h1>
        <div class="muted" style="color:#cbd5e1;margin-top:6px;">Itération 1 — socle Docker + jobs asynchrones</div>
    </div>
</header>
<main class="container">
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
