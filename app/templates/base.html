<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CleanMatch Web</title>
    <style>
        :root {
            --bg: #f3f6fb;
            --surface: rgba(255,255,255,.88);
            --surface-strong: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --line: #e2e8f0;
            --primary: #2563eb;
            --primary-soft: #dbeafe;
            --success: #16a34a;
            --success-soft: #dcfce7;
            --warning: #d97706;
            --warning-soft: #fef3c7;
            --danger: #dc2626;
            --danger-soft: #fee2e2;
            --shadow: 0 18px 55px rgba(15, 23, 42, 0.08);
            --radius: 20px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(37,99,235,.08), transparent 26%),
                radial-gradient(circle at top right, rgba(14,165,233,.08), transparent 18%),
                var(--bg);
        }
        a { color: var(--primary); text-decoration: none; }
        .container { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
        .shell { padding-bottom: 36px; }
        header {
            position: sticky; top: 0; z-index: 10;
            backdrop-filter: blur(14px);
            background: rgba(15, 23, 42, 0.78);
            border-bottom: 1px solid rgba(255,255,255,.08);
            margin-bottom: 26px;
        }
        .topbar {
            display:flex; justify-content:space-between; align-items:center; gap:16px;
            padding: 18px 0;
        }
        .brand-title { color: white; font-weight: 800; letter-spacing: -.03em; font-size: 1.4rem; }
        .brand-subtitle { color: #cbd5e1; font-size: .95rem; margin-top: 4px; }
        .top-actions { display:flex; gap:10px; flex-wrap:wrap; }
        .btn {
            display:inline-flex; align-items:center; justify-content:center; gap:8px;
            border: 0; border-radius: 12px; padding: 12px 18px; font-weight: 700;
            cursor: pointer; background: var(--primary); color: white;
            box-shadow: 0 10px 26px rgba(37,99,235,.22);
            transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn-secondary {
            background: white; color: var(--text); box-shadow: none; border: 1px solid var(--line);
        }
        .btn-ghost { background: transparent; color: white; border: 1px solid rgba(255,255,255,.18); box-shadow: none; }
        .btn-danger { background: #7f1d1d; border: 1px solid #b91c1c; color: white; box-shadow: none; }
        .btn-danger:hover { background: #991b1b; }
        .btn:disabled { opacity:.55; cursor:not-allowed; transform:none; }
        .hero {
            background: linear-gradient(135deg, rgba(37,99,235,.95), rgba(30,64,175,.93));
            color: white; border-radius: 28px; padding: 28px; box-shadow: var(--shadow); margin-bottom: 22px;
        }
        .hero p { color: rgba(255,255,255,.9); max-width: 780px; }
        .cards, .grid { display: grid; gap: 20px; }
        .cards { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
        .grid-2 { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
        .grid-3 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
        .grid-4 { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
        .card {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,.65);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 22px;
            margin-bottom: 20px;
        }
        .card h2, .card h3, .card h4 { margin-top: 0; letter-spacing: -.02em; }
        .metric-value { font-size: 2rem; font-weight: 800; letter-spacing: -.04em; }
        .metric-label { color: var(--muted); font-size: .95rem; }
        .muted { color: var(--muted); }
        .pill {
            display:inline-flex; align-items:center; gap:6px; padding: 7px 12px; border-radius:999px;
            background: rgba(255,255,255,.14); color:white; font-size:.88rem; font-weight:700;
        }
        .badge {
            display:inline-flex; align-items:center; justify-content:center;
            min-width: 92px; padding:7px 12px; border-radius:999px; font-size:.82rem; font-weight:800; text-transform: uppercase;
        }
        .badge-pending, .badge-queued { background: var(--warning-soft); color: var(--warning); }
        .badge-running { background: var(--primary-soft); color: var(--primary); }
        .badge-success { background: var(--success-soft); color: var(--success); }
        .badge-failed, .badge-cancelled { background: var(--danger-soft); color: var(--danger); }
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse: collapse; }
        th, td { padding: 14px 12px; border-bottom: 1px solid var(--line); text-align:left; vertical-align: top; }
        th { font-size: .84rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
        tr:hover td { background: rgba(148,163,184,.05); }
        .progress {
            width: 100%; background: #e2e8f0; height: 12px; border-radius: 999px; overflow:hidden;
        }
        .progress-bar {
            height:100%; width:0; background: linear-gradient(90deg, #2563eb, #0ea5e9);
            border-radius: 999px; transition: width .35s ease;
        }
        pre {
            white-space: pre-wrap; word-break: break-word; background: #0f172a; color: #e2e8f0;
            border-radius: 16px; padding: 18px; margin:0; max-height: 360px; overflow:auto;
        }
        .messages { margin-bottom: 18px; }
        .message {
            padding: 14px 16px; background: #eff6ff; border: 1px solid #bfdbfe; border-left: 5px solid #2563eb;
            border-radius: 14px; margin-bottom: 10px;
        }
        .kpi {
            display:flex; flex-direction:column; gap:10px; background: var(--surface-strong); border:1px solid var(--line);
            border-radius: 18px; padding:18px;
        }
        .stack { display:grid; gap:14px; }
        .field { display:grid; gap:8px; }
        .field label { font-weight: 700; }
        .field input[type='text'], .field input[type='file'], .field select {
            width:100%; padding: 12px 14px; border-radius: 12px; border:1px solid #cbd5e1; background:white;
            font: inherit;
        }
        .field-help { color: var(--muted); font-size: .92rem; }
        .errorlist { margin: 0; padding-left: 18px; color: var(--danger); }
        .checklist { display:grid; gap:12px; }
        .check-item {
            display:flex; gap:12px; align-items:flex-start; padding:14px; border-radius: 14px; background:#f8fafc; border:1px solid var(--line);
        }
        .toolbar { display:flex; gap:12px; justify-content:space-between; align-items:center; flex-wrap:wrap; }
        .toolbar form { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
        .small { font-size: .9rem; }
        .empty { padding: 24px; border: 1px dashed #cbd5e1; border-radius: 18px; background: rgba(255,255,255,.6); }
        .code-inline { font-family: Consolas, monospace; background: #eff6ff; padding: 2px 8px; border-radius: 999px; }
        .sheet-item { border:1px solid var(--line); border-radius: 16px; padding: 14px; background:white; }
        .sheet-item.active { border-color:#60a5fa; box-shadow: 0 0 0 4px rgba(96,165,250,.12); }
        .sheet-meta { display:flex; gap:12px; flex-wrap:wrap; color: var(--muted); font-size: .88rem; margin-top:8px; }
        .preview-table { width:100%; border-collapse: collapse; margin-top: 12px; }
        .preview-table td { border:1px solid var(--line); padding:8px; font-size:.9rem; }

        .mapping-grid { display:grid; gap:12px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
        .mapping-item { border:1px solid var(--line); border-radius:16px; padding:14px; background:white; }
        .mapping-item select { width:100%; padding:10px 12px; border-radius:12px; border:1px solid #cbd5e1; margin-top:8px; }
        .mapping-item.required { border-color: #f59e0b; background: #fffbeb; }
        .hint-list { margin:8px 0 0 18px; color: var(--muted); }
        .hidden { display:none !important; }
        @media (max-width: 720px) {
            .container { width: min(100%, calc(100% - 20px)); }
            .hero, .card { padding: 18px; border-radius: 20px; }
            .metric-value { font-size: 1.6rem; }
            .topbar { align-items:flex-start; }
        }
    </style>
</head>
<body>
<header>
    <div class="container topbar">
        <div>
            <div class="brand-title"><a href="/" style="color:white;">CleanMatch Web</a></div>
            <div class="brand-subtitle">Itération 6 — analyse de structure et mapping de colonnes</div>
        </div>
        <div class="top-actions">
            <a class="btn btn-ghost" href="{% url 'jobs:home' %}">Dashboard</a>
            <a class="btn" href="{% url 'jobs:new' %}">Nouveau job</a>
        </div>
    </div>
</header>
<main class="container shell">
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
